name: Publish NuGet

on:
  push:
    tags: ['v*']

jobs:
  publish:
    runs-on: windows-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build
        run: dotnet build Bwl.Imaging.sln -c Release -p:PackageVersion=${{ steps.version.outputs.VERSION }}

      - name: Test
        run: dotnet test Bwl.Imaging.UnitTests/Bwl.Imaging.UnitTests.vbproj -c Release --no-build

      - name: Push to NuGet.org
        run: dotnet nuget push "release/dll/*.nupkg" --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
