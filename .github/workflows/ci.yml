name: CI

on:
  push:
    branches: [master, netstandard]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: nuget/setup-nuget@v2

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore NuGet packages
        run: nuget restore Bwl.Imaging.sln

      - name: Create output directories
        run: |
          mkdir -p debug/dll
          mkdir -p release/dll
        shell: bash

      - name: Build
        run: msbuild Bwl.Imaging.sln /p:Configuration=Release /m

      - name: Test
        run: dotnet test Bwl.Imaging.UnitTests/Bwl.Imaging.UnitTests.vbproj -c Release --no-build --logger trx --results-directory TestResults
        continue-on-error: true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: TestResults/*.trx
          if-no-files-found: ignore
