name: CI

on:
  push:
    branches: [master, netstandard]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Bwl.Imaging.sln

      - name: Build
        run: dotnet build Bwl.Imaging.sln -c Release --no-restore

      - name: Test
        run: dotnet test Bwl.Imaging.UnitTests/Bwl.Imaging.UnitTests.vbproj -c Release --no-build --logger trx --results-directory TestResults

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: TestResults/*.trx

      - name: Upload NuGet packages
        uses: actions/upload-artifact@v4
        with:
          name: nupkg
          path: release/dll/*.nupkg
